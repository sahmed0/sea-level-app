<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="favicon/site.webmanifest">
  <title>Sea Level Predictor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.css" />
</head>

<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.js"></script>
  <script>
    stlite.mount(
      {
        requirements: ["pandas", "numpy", "matplotlib", "scipy"],
        entrypoint: "app.py",
        files: {
          "app.py": {
            url: "app.py",
          },
          "epa-sea-level.csv": {
            url: "epa-sea-level.csv",
          },
          "prophet_forecast.csv": {
            url: "prophet_forecast.csv",
          },
          "models.py": {
            url: "models.py",
          },
          "visuals.py": {
            url: "visuals.py",
          },
          "data.py": {
            url: "data.py",
          },
          "config.py": {
            url: "config.py",
          },
        },
      },
      document.getElementById("root")
    );
  </script>
</body>

</html>
